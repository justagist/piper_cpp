controller_manager:
  ros__parameters:
    update_rate: 200  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Forward command position controller -- streams whatever you publish on its
    # `/commands` topic straight to the joints. Useful for direct teleop / scripts.
    joint_position_controller:
      type: forward_command_controller/ForwardCommandController

    # Trajectory controller -- accepts FollowJointTrajectory action goals (e.g. from
    # MoveIt) and interpolates to them at the controller manager's update rate.
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Gripper trajectory controller. Defined here for both gripper and no-gripper bringups;
    # only spawned when piper_control.launch.py is invoked with with_gripper:=true.
    # Uses JTC (not gripper_action_controller) for parity with the official piper_ros
    # MoveIt configuration.
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_position_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    interface_name: position

joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

gripper_controller:
  ros__parameters:
    joints:
      - joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
